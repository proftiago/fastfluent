<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#191919">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fast Fluent">
<meta name="description" content="Gestão completa da sua escola de idiomas — Fast Fluent">
<title>Fast Fluent</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-feature-settings:'cv11','ss01','rlig' 1,'calt' 1;
  font-optical-sizing:auto;
}
#root{height:100%;overflow:auto}

/* Scrollbars — Notion style, very subtle */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.22)}

/* Selection */
::selection{background:rgba(124,58,237,.15);color:inherit}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{
  from{opacity:0;transform:translateY(12px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-7px)}35%{transform:translateX(7px)}
  55%{transform:translateX(-4px)}75%{transform:translateX(4px)}
}
.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97) both}

/* Table rows — Notion hover */
.fhr-row:hover td{background:rgba(0,0,0,.018)!important}

/* Nav items — Notion nav */
.nav-item:hover{
  background:rgba(255,255,255,.07)!important;
  color:rgba(255,255,255,.72)!important;
}
.nav-item:active{transform:scale(.98)!important}

/* Sidebar tooltip */
.sidebar-tooltip{
  display:none;position:absolute;left:calc(100% + 10px);top:50%;
  transform:translateY(-50%);white-space:nowrap;
  background:#191919;color:rgba(255,255,255,.85);
  font-size:12px;font-weight:500;padding:5px 10px;
  border-radius:7px;pointer-events:none;z-index:9999;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.07);
}
.nav-item:hover .sidebar-tooltip{display:block}

/* Inputs — clean focus */
input:focus,select:focus,textarea:focus{
  border-color:rgba(124,58,237,.5)!important;
  box-shadow:0 0 0 3px rgba(124,58,237,.1)!important;
  outline:none!important;
}

/* Buttons */
button{font-family:inherit;letter-spacing:-.1px}
button:hover{opacity:.88}
button:active{transform:scale(.97)!important;opacity:.92}

/* Checkboxes */
input[type=checkbox]{accent-color:#7c3aed;cursor:pointer}

/* All elements */
input,select,textarea{font-family:inherit}

/* Card Notion-style: white paper with thin border */
/* No elevation by default, just paper */
</style>

<style>
@media (max-width: 767px) {
  /* Esconde sidebar desktop */
  .ff-sidebar { display: none !important; }
  /* Conteúdo principal full width */
  .ff-main { margin-left: 0 !important; padding-bottom: 68px !important; }
  /* Padding menor no mobile */
  .ff-main-inner { padding: 16px 14px !important; max-width: 100% !important; }
  /* Tabelas scrolláveis */
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  /* Grids viram coluna única */
  .ff-grid-auto { grid-template-columns: 1fr !important; }
  /* Bottom nav */
  .ff-bottom-nav {
    display: flex !important;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #191919;
    height: 60px;
    z-index: 9999;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,.12);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .ff-nav-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,.45); padding: 8px 12px;
    font-family: inherit; font-size: 10px; font-weight: 500;
    transition: color .15s; flex: 1;
  }
  .ff-nav-btn.active { color: #a78bfa; }
  .ff-nav-btn svg { width: 20px; height: 20px; }
}
@media (min-width: 768px) {
  .ff-bottom-nav { display: none !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
window.showToast=(msg,type='info',d=3000)=>{
  let c=document.getElementById('__t');
  if(!c){c=document.createElement('div');c.id='__t';Object.assign(c.style,{position:'fixed',bottom:'20px',right:'20px',zIndex:'9999',display:'flex',flexDirection:'column',gap:'6px',pointerEvents:'none'});document.body.appendChild(c);}
  const cc={success:'#0f7b5a',error:'#c92a2a',info:'#7c3aed',warn:'#a16207'};
  const t=document.createElement('div');
  Object.assign(t.style,{background:'#191919',color:'rgba(255,255,255,.85)',padding:'10px 16px',borderRadius:'9px',fontSize:'13px',fontWeight:'500',boxShadow:'0 4px 20px rgba(0,0,0,.3)',animation:'slideUp .18s ease both',borderLeft:'3px solid '+(cc[type]||cc.info),maxWidth:'300px',fontFamily:'inherit',lineHeight:'1.4'});
  t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .25s';setTimeout(()=>t.remove(),250);},d);
};
</script>

              leads:data.fhr_leads||[],
              lancs:data.fhr_lancs||[]
            };
            try{localStorage.setItem('fasthr_v4',JSON.stringify(rebuilt));}catch(x){}
            if(data.fhr_cfg){
              try{localStorage.setItem('fasthr_cfg_v4',JSON.stringify(data.fhr_cfg));}catch(x){}
            }
            console.log('\u2601\uFE0F Dados convertidos e carregados da nuvem');
          }else{
            console.log('\u2601\uFE0F Dados carregados da nuvem');
          }
        }else{
          console.log('\u2601\uFE0F Nenhum dado na nuvem, usando localStorage');
        }
        interceptLS();
        launch();
      })
      .catch(function(e){
        console.warn('Erro ao carregar nuvem',e);
        interceptLS();
        launch();
      });
  });
})();
</script>
